<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sheet Row Form Filler</title>
    <style>
      body { font: 13px system-ui, sans-serif; margin: 0; padding: 12px; color: #1a1a1a; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      .row { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
      button { padding: 6px 10px; border: 1px solid #2d7a3a; background: #2d7a3a; color: white; border-radius: 4px; cursor: pointer; font-size: 12px; }
      button.secondary { background: white; color: #333; border-color: #ccc; }
      button.warn { background: #b45309; border-color: #b45309; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      input[type=file], select, input[type=search] { font-size: 12px; padding: 4px; width: 100%; box-sizing: border-box; }
      .meta { font-size: 11px; color: #666; }
      .status { padding: 6px 8px; border-radius: 4px; font-size: 12px; margin-top: 6px; }
      .status.ok { background: #e6f4ea; color: #1e7a37; }
      .status.err { background: #fde7e9; color: #a02531; }
      table { width: 100%; border-collapse: collapse; font-size: 11px; }
      thead { position: sticky; top: 0; background: #f5f5f5; }
      th, td { border: 1px solid #e5e5e5; padding: 3px 5px; text-align: left; white-space: nowrap; max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
      tbody tr { cursor: pointer; }
      tbody tr:hover { background: #f0f7ff; }
      tbody tr.selected { background: #d6ebff; }
      tbody tr.completed { background: #d6f5d6; color: #1e5a2a; }
      tbody tr.completed.selected { background: #b5e8b5; }
      .table-wrap { max-height: 360px; overflow: auto; border: 1px solid #e5e5e5; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Sheet Row → Form Filler</h1>

    <div class="row">
      <input type="file" id="file" accept=".xlsx,.xls,.csv" />
      <button id="clear" class="secondary">Clear</button>
    </div>
    <div class="meta" id="fileMeta">No file loaded.</div>

    <div class="row" style="margin-top:10px">
      <select id="sheet" style="flex:1"></select>
      <input type="search" id="search" placeholder="Filter rows…" style="flex:2" />
    </div>

    <div class="table-wrap" id="tableWrap"></div>

    <div class="row" style="margin-top:10px; justify-content: space-between;">
      <span class="meta" id="selMeta">No row selected.</span>
      <div class="row" style="margin:0; gap:6px;">
        <button id="complete" class="warn" disabled>Mark complete</button>
        <button id="fill" disabled>Fill form</button>
      </div>
    </div>

    <div class="row" style="margin-top:6px;">
      <button id="download" class="secondary" disabled>Download report (with completion status)</button>
    </div>

    <div id="status"></div>

    <script src="vendor/xlsx.full.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
